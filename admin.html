<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - IMSAJALAH</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #050816;
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(0, 229, 255, 0.3);
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            color: #7dd3fc;
            font-size: 14px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid rgba(0, 229, 255, 0.3);
            border-radius: 14px;
            padding: 20px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 12px;
            color: #8cecff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-card .number {
            font-size: 36px;
            font-weight: bold;
            color: #00e5ff;
        }

        .visitors-section {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            padding: 30px;
            backdrop-filter: blur(25px);
        }

        .visitors-section h2 {
            margin-bottom: 20px;
            font-size: 20px;
            color: #00e5ff;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 229, 255, 0.2);
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
            font-weight: 600;
        }

        .btn:hover {
            background: #00c8ff;
            color: #001018;
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        .btn.danger {
            background: rgba(255, 100, 100, 0.2);
            border-color: rgba(255, 100, 100, 0.3);
        }

        .btn.danger:hover {
            background: #ff6464;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        table thead {
            background: rgba(0, 229, 255, 0.15);
        }

        table th,
        table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        table th {
            font-weight: 600;
            color: #00e5ff;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        table tbody tr {
            transition: 0.2s;
        }

        table tbody tr:hover {
            background: rgba(0, 229, 255, 0.08);
        }

        table td {
            font-size: 14px;
            color: #d5d5d5;
        }

        .empty {
            text-align: center;
            padding: 40px 20px;
            color: #7dd3fc;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #7dd3fc;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: rgba(0, 229, 255, 0.2);
            border: 1px solid rgba(0, 229, 255, 0.3);
            border-radius: 8px;
            color: #fff;
            text-decoration: none;
            transition: 0.3s;
            font-size: 14px;
        }

        .back-btn:hover {
            background: #00c8ff;
            color: #001018;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 24px;
            }

            .stat-card .number {
                font-size: 28px;
            }

            table th,
            table td {
                padding: 10px;
                font-size: 12px;
            }
        }
    </style>
</head>

<body>
    <div class="admin-container">
        <a href="index.html" class="back-btn">← Kembali ke Website</a>

        <div class="header">
            <h1>📊 Admin Panel</h1>
            <p>Pantau pengunjung website Anda</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>Total Pengunjung</h3>
                <div class="number" id="totalVisitors">-</div>
            </div>
            <div class="stat-card">
                <h3>Hari Ini</h3>
                <div class="number" id="todayVisitors">-</div>
            </div>
            <div class="stat-card">
                <h3>Minggu Ini</h3>
                <div class="number" id="weekVisitors">-</div>
            </div>
            <div class="stat-card">
                <h3>Bulan Ini</h3>
                <div class="number" id="monthVisitors">-</div>
            </div>
        </div>

        <div class="visitors-section">
            <h2>📋 Daftar Pengunjung</h2>

            <div class="controls">
                <button class="btn" onclick="loadVisitors()">🔄 Refresh</button>
                <button class="btn danger" onclick="clearAllVisitors()">🗑️ Hapus Semua Data</button>
                <button class="btn" onclick="exportCSV()">📥 Export CSV</button>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Waktu Kunjungan</th>
                            <th>IP Address</th>
                            <th>Device/Browser</th>
                            <th>Lokasi</th>
                            <th>Referrer</th>
                        </tr>
                    </thead>
                    <tbody id="visitorsTableBody">
                        <tr>
                            <td colspan="6" class="loading">⏳ Memuat data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'YOUR_GOOGLE_APPS_SCRIPT_URL'; // Ganti dengan URL dari deployment

        async function loadVisitors() {
            try {
                const response = await fetch(SCRIPT_URL + '?action=getVisitors');
                const data = await response.json();

                updateStats(data);
                updateTable(data);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('visitorsTableBody').innerHTML =
                    '<tr><td colspan="6" class="empty">❌ Gagal memuat data. Pastikan URL Script benar!</td></tr>';
            }
        }

        function updateStats(visitors) {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const weekAgo = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);
            const monthAgo = new Date(today.getFullYear(), today.getMonth(), 1);

            const todayCount = visitors.filter(v => {
                const vDate = new Date(v.timestamp);
                return vDate >= today;
            }).length;

            const weekCount = visitors.filter(v => {
                const vDate = new Date(v.timestamp);
                return vDate >= weekAgo;
            }).length;

            const monthCount = visitors.filter(v => {
                const vDate = new Date(v.timestamp);
                return vDate >= monthAgo;
            }).length;

            document.getElementById('totalVisitors').textContent = visitors.length;
            document.getElementById('todayVisitors').textContent = todayCount;
            document.getElementById('weekVisitors').textContent = weekCount;
            document.getElementById('monthVisitors').textContent = monthCount;
        }

        function updateTable(visitors) {
            const tbody = document.getElementById('visitorsTableBody');

            if (visitors.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty">📭 Belum ada pengunjung</td></tr>';
                return;
            }

            tbody.innerHTML = visitors
                .reverse()
                .map((visitor, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td>${new Date(visitor.timestamp).toLocaleString('id-ID')}</td>
                    <td>${visitor.ip}</td>
                    <td>${visitor.userAgent}</td>
                    <td>${visitor.location || '-'}</td>
                    <td>${visitor.referrer || '-'}</td>
                </tr>
            `)
                .join('');
        }

        function clearAllVisitors() {
            if (confirm('⚠️ Yakin ingin menghapus SEMUA data pengunjung? Tindakan ini tidak bisa dibatalkan!')) {
                fetch(SCRIPT_URL + '?action=clearVisitors', { method: 'GET' })
                    .then(() => {
                        alert('✓ Data berhasil dihapus');
                        loadVisitors();
                    })
                    .catch(error => console.error('Error:', error));
            }
        }

        function exportCSV() {
            fetch(SCRIPT_URL + '?action=getVisitors')
                .then(response => response.json())
                .then(data => {
                    const csv = [
                        ['No', 'Waktu Kunjungan', 'IP Address', 'Device/Browser', 'Lokasi', 'Referrer'],
                        ...data.map((v, i) => [
                            i + 1,
                            new Date(v.timestamp).toLocaleString('id-ID'),
                            v.ip,
                            v.userAgent,
                            v.location || '-',
                            v.referrer || '-'
                        ])
                    ]
                        .map(row => row.map(cell => `"${cell}"`).join(','))
                        .join('\n');

                    const blob = new Blob([csv], { type: 'text/csv' });
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `visitors_${new Date().toISOString().split('T')[0]}.csv`;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    a.remove();
                })
                .catch(error => console.error('Error:', error));
        }

        // Load data saat halaman dibuka
        loadVisitors();

        // Refresh otomatis setiap 10 detik
        setInterval(loadVisitors, 10000);
    </script>
</body>

</html>
